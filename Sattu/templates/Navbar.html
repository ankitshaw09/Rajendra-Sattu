<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Rajendra Sattu | Naturally Processed Heritage</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;0,800;1,400;1,700&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet" />
    <style>
      :root {
        --bg: #f7f2e9;
        --bg-deep: #efe8d8;
        --surface: #fdfaf4;
        --surface-card: #fffef9;
        --primary: #7a4f00;
        --primary-light: #c8811a;
        --primary-gold: #e0a825;
        --primary-pale: #fdefc9;
        --secondary: #3d5a22;
        --secondary-pale: #deebbf;
        --terra: #8a4a3b;
        --terra-pale: #f4ddd8;
        --ink: #1e1a12;
        --ink-soft: #5a4e3c;
        --ink-muted: #8a7c68;
        --border: rgba(122, 79, 0, 0.14);
        --gold-line: #d9a520;
        --font-head: "Instrument Serif", "Noto Serif", Georgia, serif;
        --font-sub: "Noto Serif", Georgia, serif;
        --font-body: "DM Sans", sans-serif;
        --shadow-card:
          0 4px 32px rgba(90, 60, 10, 0.1), 0 1px 4px rgba(90, 60, 10, 0.06);
        --shadow-strong: 0 12px 48px rgba(90, 60, 10, 0.18);
        --radius: 14px;
        --radius-sm: 8px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-body);
        font-size: 16px;
        line-height: 1.65;
        overflow-x: hidden;
      }
      ::selection {
        background: var(--primary-pale);
        color: var(--primary);
      }

      /* Grain overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        background-size: 200px 200px;
      }

      .material-symbols-outlined {
        font-family: "Material Symbols Outlined";
        font-style: normal;
        font-size: 24px;
        display: inline-block;
        line-height: 1;
        vertical-align: middle;
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 24;
      }
      .container {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0 2.5rem;
      }
      .eyebrow {
        font-family: var(--font-body);
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--secondary);
        display: block;
      }
      img {
        display: block;
        max-width: 100%;
      }

      /* Animations */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes floatA {
        0%,
        100% {
          transform: rotate(-5deg) translateY(0);
        }
        50% {
          transform: rotate(-5deg) translateY(-10px);
        }
      }
      @keyframes floatB {
        0%,
        100% {
          transform: rotate(3deg) translateY(0);
        }
        50% {
          transform: rotate(3deg) translateY(-8px);
        }
      }
      @keyframes marqueeScroll {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }

      .au {
        animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .ai {
        animation: fadeIn 1s ease both;
      }
      .d1 {
        animation-delay: 0.15s;
      }
      .d2 {
        animation-delay: 0.3s;
      }
      .d3 {
        animation-delay: 0.48s;
      }
      .d4 {
        animation-delay: 0.62s;
      }

      /* ── NAV ── */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 1rem 2.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(247, 242, 233, 0.9);
        backdrop-filter: blur(18px) saturate(160%);
        border-bottom: 1px solid var(--border);
        transition: box-shadow 0.3s;
      }
      nav.scrolled {
        box-shadow: 0 2px 24px rgba(90, 60, 10, 0.09);
      }
      .nav-brand {
        display: flex;
        flex-direction: column;
        line-height: 1.1;
      }
      .nav-brand-main {
        font-family: var(--font-head);
        font-size: 1.3rem;
        color: var(--primary);
        font-weight: 700;
      }
      .nav-brand-sub {
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--ink-muted);
      }
      .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
      }
      .nav-links a {
        font-size: 0.84rem;
        font-weight: 500;
        color: var(--ink-soft);
        text-decoration: none;
        letter-spacing: 0.02em;
        transition: color 0.2s;
        position: relative;
      }
      .nav-links a::after {
        content: "";
        position: absolute;
        bottom: -3px;
        left: 0;
        right: 100%;
        height: 1.5px;
        background: var(--primary-gold);
        transition: right 0.28s ease;
      }
      .nav-links a:hover {
        color: var(--primary);
      }
      .nav-links a:hover::after {
        right: 0;
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 0.8rem;
      }
      .nav-icon {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--ink-soft);
        display: flex;
        align-items: center;
        padding: 0.4rem;
        border-radius: 50%;
        transition:
          background 0.2s,
          color 0.2s;
      }
      .nav-icon:hover {
        background: var(--primary-pale);
        color: var(--primary);
      }
      .btn-cta-nav {
        background: var(--primary);
        color: #fff;
        border: none;
        cursor: pointer;
        font-family: var(--font-body);
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        padding: 0.58rem 1.2rem;
        border-radius: 100px;
        transition:
          background 0.25s,
          transform 0.2s;
      }
      .btn-cta-nav:hover {
        background: var(--primary-light);
        transform: translateY(-1px);
      }

      /* ── HERO ── */
      .hero {
        padding-top: 5.5rem;
        min-height: 100vh;
        display: flex;
        align-items: center;
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: "";
        position: absolute;
        top: -100px;
        right: -120px;
        width: 640px;
        height: 640px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 40% 40%,
          #e8c46618,
          #c8811a06,
          transparent 70%
        );
        pointer-events: none;
      }
      .hero::after {
        content: "";
        position: absolute;
        bottom: -60px;
        left: -80px;
        width: 440px;
        height: 440px;
        border-radius: 50%;
        background: radial-gradient(circle, #3d5a220c, transparent 70%);
        pointer-events: none;
      }
      .hero-inner {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4rem;
        align-items: center;
        width: 100%;
      }
      .hero-badge-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        background: var(--primary-pale);
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 0.38rem 1rem 0.38rem 0.55rem;
        margin-bottom: 1.8rem;
      }
      .hero-badge-pill .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--primary-gold);
        flex-shrink: 0;
      }
      .hero-badge-pill span {
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--primary);
      }
      .hero-h1 {
        font-family: var(--font-head);
        font-size: clamp(3rem, 5.5vw, 5.5rem);
        font-weight: 700;
        line-height: 1.04;
        letter-spacing: -0.02em;
        color: var(--ink);
        margin-bottom: 1.4rem;
      }
      .hero-h1 em {
        font-style: italic;
        color: var(--primary);
        position: relative;
        display: inline-block;
      }
      .hero-h1 em::after {
        content: "";
        position: absolute;
        bottom: 2px;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--primary-gold), transparent);
        border-radius: 2px;
      }
      .hero-sub {
        font-size: 1.05rem;
        color: var(--ink-soft);
        max-width: 400px;
        line-height: 1.72;
        margin-bottom: 2.2rem;
      }
      .hero-actions {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
      }
      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--primary);
        color: #fff;
        border: none;
        cursor: pointer;
        font-family: var(--font-body);
        font-size: 0.9rem;
        font-weight: 600;
        padding: 0.88rem 1.8rem;
        border-radius: 100px;
        box-shadow: 0 4px 20px rgba(122, 79, 0, 0.26);
        transition:
          background 0.25s,
          transform 0.2s,
          box-shadow 0.25s;
        text-decoration: none;
      }
      .btn-primary:hover {
        background: var(--primary-light);
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(122, 79, 0, 0.3);
      }
      .btn-ghost {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: none;
        border: none;
        cursor: pointer;
        font-family: var(--font-body);
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--primary);
        padding: 0.88rem 0;
        border-bottom: 2px solid var(--primary-pale);
        transition: border-color 0.2s;
        text-decoration: none;
      }
      .btn-ghost:hover {
        border-color: var(--primary-gold);
      }
      .btn-ghost .arr,
      .btn-primary .arr {
        transition: transform 0.2s;
      }
      .btn-ghost:hover .arr,
      .btn-primary:hover .arr {
        transform: translateX(3px);
      }

      .hero-trust {
        display: flex;
        gap: 1.4rem;
        margin-top: 2.2rem;
        flex-wrap: wrap;
      }
      .trust-pill {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 0.77rem;
        font-weight: 500;
        color: var(--ink-soft);
      }
      .trust-pill .tw {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--secondary-pale);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .trust-pill .tw .material-symbols-outlined {
        font-size: 15px;
        color: var(--secondary);
        font-variation-settings:
          "FILL" 1,
          "wght" 400;
      }

      .hero-visual {
        position: relative;
      }
      .hero-img-main {
        width: 100%;
        aspect-ratio: 4/5;
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow-strong);
        transform: rotate(3deg);
        animation: floatB 6s ease-in-out infinite;
        position: relative;
      }
      .hero-img-main::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(30, 20, 5, 0.22) 0%,
          transparent 50%
        );
      }
      .hero-img-main img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .hero-badge-fl {
        position: absolute;
        left: -46px;
        bottom: 56px;
        background: var(--surface-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 1.1rem 1.3rem;
        box-shadow: var(--shadow-card);
        animation: floatA 5s ease-in-out 1s infinite;
        min-width: 155px;
      }
      .hero-badge-fl .ic {
        font-size: 1.9rem;
        color: var(--secondary);
        font-variation-settings:
          "FILL" 1,
          "wght" 400;
        margin-bottom: 0.45rem;
        display: block;
      }
      .hero-badge-fl p {
        font-family: var(--font-sub);
        font-size: 0.92rem;
        font-weight: 700;
        color: var(--ink);
        line-height: 1.2;
      }
      .hero-badge-fl small {
        font-size: 0.68rem;
        color: var(--ink-muted);
      }
      .hero-stat-fl {
        position: absolute;
        right: -18px;
        top: 44px;
        background: var(--primary);
        color: #fff;
        border-radius: var(--radius-sm);
        padding: 0.9rem 1.2rem;
        box-shadow: 0 8px 24px rgba(122, 79, 0, 0.3);
        text-align: center;
        min-width: 108px;
        animation: floatA 5.5s ease-in-out 0.5s infinite;
      }
      .hero-stat-fl .sn {
        font-family: var(--font-head);
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--primary-pale);
        display: block;
        line-height: 1;
      }
      .hero-stat-fl .sl {
        font-size: 0.66rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0.8;
        margin-top: 0.25rem;
        display: block;
      }

      /* ── MARQUEE ── */
      .marquee-band {
        background: var(--primary);
        overflow: hidden;
        padding: 0.72rem 0;
        margin-top: 4.5rem;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .marquee-track {
        display: flex;
        width: max-content;
        animation: marqueeScroll 30s linear infinite;
      }
      .mi {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0 2.2rem;
        white-space: nowrap;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.88);
      }
      .mi .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--primary-gold);
      }

      /* ── PROCESS ── */
      .sect-process {
        padding: 7.5rem 0;
        background: var(--bg-deep);
        position: relative;
      }
      .sect-process::before,
      .sect-process::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold-line),
          transparent
        );
      }
      .sect-process::before {
        top: 0;
      }
      .sect-process::after {
        bottom: 0;
      }
      .process-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6rem;
        align-items: center;
      }
      .pgallery {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .pcol-offset {
        padding-top: 2.5rem;
      }
      .pimg {
        border-radius: var(--radius-sm);
        overflow: hidden;
        box-shadow: var(--shadow-card);
        background: var(--surface-card);
        padding: 5px;
      }
      .pimg img {
        border-radius: 6px;
        width: 100%;
        object-fit: cover;
        display: block;
      }
      .pimg-t img {
        height: 250px;
      }
      .pimg-s img {
        height: 170px;
      }

      .ptext h2 {
        font-family: var(--font-head);
        font-size: clamp(2rem, 3.2vw, 2.8rem);
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -0.02em;
        color: var(--ink);
        margin: 0.8rem 0 1.1rem;
      }
      .ptext h2 span {
        color: var(--primary);
        font-style: italic;
      }
      .ptext > p {
        font-size: 0.98rem;
        color: var(--ink-soft);
        line-height: 1.75;
        margin-bottom: 2.2rem;
        max-width: 420px;
      }
      .steps {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      .step {
        display: flex;
        align-items: flex-start;
        gap: 1rem;
      }
      .step-ic {
        width: 42px;
        height: 42px;
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .gold-ic {
        background: var(--primary-pale);
      }
      .grn-ic {
        background: var(--secondary-pale);
      }
      .ter-ic {
        background: var(--terra-pale);
      }
      .gold-ic .material-symbols-outlined {
        color: var(--primary);
        font-size: 19px;
        font-variation-settings: "FILL" 1;
      }
      .grn-ic .material-symbols-outlined {
        color: var(--secondary);
        font-size: 19px;
        font-variation-settings: "FILL" 1;
      }
      .ter-ic .material-symbols-outlined {
        color: var(--terra);
        font-size: 19px;
        font-variation-settings: "FILL" 1;
      }
      .step-c h4 {
        font-family: var(--font-sub);
        font-size: 0.93rem;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 0.18rem;
      }
      .step-c p {
        font-size: 0.83rem;
        color: var(--ink-muted);
        line-height: 1.55;
      }

      /* ── PRODUCTS ── */
      .sect-products {
        padding: 7.5rem 0;
      }
      .sect-hd {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 3rem;
        gap: 2rem;
        flex-wrap: wrap;
      }
      .sect-hd-l h2 {
        font-family: var(--font-head);
        font-size: clamp(1.9rem, 3vw, 2.7rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--ink);
        margin: 0.65rem 0 0.5rem;
        line-height: 1.15;
      }
      .sect-hd-l p {
        font-size: 0.93rem;
        color: var(--ink-muted);
        max-width: 360px;
      }
      .btn-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.87rem;
        font-weight: 600;
        color: var(--primary);
        text-decoration: none;
        background: none;
        border: none;
        cursor: pointer;
        border-bottom: 1.5px solid var(--primary-pale);
        transition: border-color 0.2s;
        white-space: nowrap;
        padding: 0;
      }
      .btn-link:hover {
        border-color: var(--primary-gold);
      }
      .btn-link .arr {
        transition: transform 0.2s;
      }
      .btn-link:hover .arr {
        transform: translateX(4px);
      }

      .prod-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.4rem;
      }
      .prod-card {
        background: var(--surface-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow-card);
        transition:
          transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 0.3s;
      }
      .prod-card:hover {
        transform: translateY(-6px);
        box-shadow: var(--shadow-strong);
      }
      .prod-img-w {
        aspect-ratio: 4/5;
        overflow: hidden;
        position: relative;
        background: var(--bg-deep);
      }
      .prod-img-w img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .prod-card:hover .prod-img-w img {
        transform: scale(1.07);
      }
      .prod-img-ov {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(20, 10, 0, 0.28) 0%,
          transparent 52%
        );
        pointer-events: none;
      }
      .prod-badge {
        position: absolute;
        top: 14px;
        left: 14px;
        padding: 0.28rem 0.72rem;
        border-radius: 100px;
        font-size: 0.66rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        backdrop-filter: blur(8px);
      }
      .b-grn {
        background: rgba(61, 90, 34, 0.88);
        color: #e2f0c8;
      }
      .b-terra {
        background: rgba(138, 74, 59, 0.88);
        color: #fce8e3;
      }
      .prod-body {
        padding: 1.3rem 1.4rem 1.4rem;
      }
      .prod-meta {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 0.4rem;
      }
      .prod-name {
        font-family: var(--font-head);
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--ink);
        line-height: 1.15;
      }
      .prod-price {
        font-family: var(--font-sub);
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--primary);
        flex-shrink: 0;
        margin-left: 0.5rem;
      }
      .prod-desc {
        font-size: 0.83rem;
        color: var(--ink-muted);
        line-height: 1.58;
        margin-bottom: 1.1rem;
      }
      .prod-tags {
        display: flex;
        gap: 0.42rem;
        flex-wrap: wrap;
        margin-bottom: 1.1rem;
      }
      .prod-tag {
        font-size: 0.67rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        color: var(--secondary);
        background: var(--secondary-pale);
        border-radius: 100px;
        padding: 0.18rem 0.62rem;
      }
      .btn-bag {
        width: 100%;
        padding: 0.78rem;
        border-radius: var(--radius-sm);
        border: 1.5px solid var(--primary);
        background: transparent;
        color: var(--primary);
        font-family: var(--font-body);
        font-size: 0.84rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.45rem;
        transition:
          background 0.22s,
          color 0.22s,
          transform 0.15s;
      }
      .btn-bag:hover {
        background: var(--primary);
        color: #fff;
        transform: translateY(-1px);
      }

      /* ── STATS ── */
      .sect-stats {
        background: var(--ink);
        padding: 5rem 0;
        position: relative;
        overflow: hidden;
      }
      .sect-stats::before {
        content: "";
        position: absolute;
        inset: 0;
        background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.018'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 2rem;
      }
      .stat-item {
        text-align: center;
        padding: 0 1rem;
        position: relative;
      }
      .stat-item + .stat-item::before {
        content: "";
        position: absolute;
        left: 0;
        top: 10%;
        bottom: 10%;
        width: 1px;
        background: rgba(255, 255, 255, 0.1);
      }
      .stat-big {
        font-family: var(--font-head);
        font-size: clamp(2.6rem, 4vw, 3.8rem);
        font-weight: 700;
        color: var(--primary-gold);
        line-height: 1;
        display: block;
        margin-bottom: 0.4rem;
      }
      .stat-lab {
        font-size: 0.77rem;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 500;
      }

      /* ── QUOTE ── */
      .sect-quote {
        padding: 8rem 0;
        text-align: center;
        position: relative;
      }
      .sect-quote::before {
        content: "";
        position: absolute;
        top: 3.5rem;
        left: 50%;
        transform: translateX(-50%);
        width: 1px;
        height: 52px;
        background: linear-gradient(to bottom, transparent, var(--gold-line));
      }
      .q-mark {
        font-family: Georgia, serif;
        font-size: 7rem;
        line-height: 0.5;
        color: var(--primary-pale);
        margin-bottom: 1.3rem;
        display: block;
        user-select: none;
      }
      .q-text {
        font-family: var(--font-head);
        font-size: clamp(1.3rem, 2.4vw, 1.9rem);
        font-style: italic;
        color: var(--ink);
        max-width: 740px;
        margin: 0 auto 1.7rem;
        line-height: 1.52;
        letter-spacing: -0.01em;
      }
      .q-auth {
        font-size: 0.76rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--secondary);
        font-weight: 600;
      }
      .q-orn {
        margin: 1.8rem auto 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        color: var(--ink-muted);
      }
      .q-orn::before,
      .q-orn::after {
        content: "";
        flex: 1;
        max-width: 110px;
        height: 1px;
        background: var(--border);
      }

      /* ── FOOTER ── */
      footer {
        background: var(--ink);
        color: rgba(255, 255, 255, 0.72);
        padding: 4.5rem 0 2.2rem;
        border-top: 3px solid var(--primary);
      }
      .foot-top {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr;
        gap: 3rem;
        margin-bottom: 3.5rem;
      }
      .foot-name {
        font-family: var(--font-head);
        font-size: 1.4rem;
        color: #fff;
        margin-bottom: 0.35rem;
      }
      .foot-sub {
        font-size: 0.67rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--primary-gold);
        margin-bottom: 1rem;
        display: block;
      }
      .foot-desc {
        font-size: 0.86rem;
        line-height: 1.7;
        max-width: 250px;
      }
      .foot-col-t {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 1.1rem;
      }
      .foot-col ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
      }
      .foot-col ul a {
        font-size: 0.86rem;
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
        transition: color 0.2s;
      }
      .foot-col ul a:hover {
        color: var(--primary-gold);
      }
      .foot-bot {
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-top: 1.8rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      .foot-bot p {
        font-size: 0.76rem;
        color: rgba(255, 255, 255, 0.32);
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 900px) {
        .hero-inner {
          grid-template-columns: 1fr;
          text-align: center;
        }
        .hero-sub,
        .hero-trust {
          margin-left: auto;
          margin-right: auto;
          justify-content: center;
        }
        .hero-actions {
          justify-content: center;
        }
        .hero-visual {
          display: none;
        }
        .process-grid {
          grid-template-columns: 1fr;
        }
        .pgallery {
          order: 2;
        }
        .prod-grid {
          grid-template-columns: 1fr 1fr;
        }
        .stats-grid {
          grid-template-columns: 1fr 1fr;
        }
        .foot-top {
          grid-template-columns: 1fr 1fr;
        }
        .nav-links {
          display: none;
        }
        .hero-badge-fl,
        .hero-stat-fl {
          display: none;
        }
      }
      @media (max-width: 560px) {
        .container {
          padding: 0 1.2rem;
        }
        .prod-grid {
          grid-template-columns: 1fr;
        }
        .stats-grid {
          grid-template-columns: 1fr 1fr;
          gap: 1rem;
        }
        .foot-top {
          grid-template-columns: 1fr;
        }
        .sect-hd {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
